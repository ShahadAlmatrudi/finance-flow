<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards - FinanceFlow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="appPageBody">

    <div class="appLayout">
        <aside class="sidebar">
            <div class="sidebarBrand">
                <a href="dashboard.html" class="sidebarLogo">💸 FinanceFlow</a>
            </div>

            <nav class="sidebarNav">
                <a href="dashboard.html" class="navItem">Dashboard</a>
                <a href="transactions.html" class="navItem">Transactions</a>
                <a href="budget.html" class="navItem">Budget</a>
                <a href="analytics.html" class="navItem">Analytics</a>
                <a href="cards.html" class="navItem active">Cards</a>
                <a href="notifications.html" class="navItem">Notifications</a>
                <a href="profile-view.html" class="navItem">Account Settings</a>
            </nav>

            <div class="sidebarUser">
                <div class="sidebarAvatar" id="sidebarAvatar">U</div>
                <div class="sidebarUserText">
                    <p class="sidebarUserName" id="sidebarUserName">User</p>
                    <button class="sidebarLogoutBtn" id="logoutBtn" type="button">Logout</button>
                </div>
            </div>
        </aside>

        <main class="mainContent">
            <header class="topBar">
                <div>
                    <h1 class="pageHeading">Cards & Cash</h1>
                    <p class="pageSubheading">Manage your saved cards and available cash balance.</p>
                </div>
            </header>

            <section class="transactionsTopGrid">
                <article class="dashboardPanel">
                    <div class="panelHeader">
                        <h2>Add New Card</h2>
                    </div>

                    <form id="cardForm" class="settingsForm">
                        <div class="settingsGrid">
                            <div class="inputGroup">
                                <label for="card-type">Card Type</label>
                                <select id="card-type">
                                    <option value="">Select card type</option>
                                    <option value="Visa">Visa</option>
                                    <option value="Mastercard">Mastercard</option>
                                    <option value="Mada">Mada</option>
                                </select>
                                <small class="errorMsg" id="cardTypeError"></small>
                            </div>

                            <div class="inputGroup">
                                <label for="card-number">Card Number</label>
                                <input type="text" id="card-number" placeholder="Enter 16-digit card number">
                                <small class="errorMsg" id="cardNumberError"></small>
                            </div>
                        </div>

                        <div class="settingsGrid">
                            <div class="inputGroup">
                                <label for="card-name">Cardholder Name</label>
                                <input type="text" id="card-name" placeholder="Enter cardholder name">
                                <small class="errorMsg" id="cardNameError"></small>
                            </div>

                            <div class="inputGroup">
                                <label for="card-balance">Current Card Balance</label>
                                <input type="number" id="card-balance" placeholder="Enter current balance">
                                <small class="errorMsg" id="cardBalanceError"></small>
                            </div>
                        </div>

                        <div class="settingsGrid">
                            <div class="inputGroup">
                                <label for="exp-month">Exp. Month</label>
                                <input type="text" id="exp-month" placeholder="MM">
                                <small class="errorMsg" id="expMonthError"></small>
                            </div>

                            <div class="inputGroup">
                                <label for="exp-year">Exp. Year</label>
                                <input type="text" id="exp-year" placeholder="YY">
                                <small class="errorMsg" id="expYearError"></small>
                            </div>
                        </div>

                        <div class="settingsGrid">
                            <div class="inputGroup">
                                <label for="cvv">CVV / CVC</label>
                                <input type="text" id="cvv" placeholder="3 digits">
                                <small class="errorMsg" id="cvvError"></small>
                            </div>

                            <div class="inputGroup inlineCheckGroup">
                                <label class="optionLabel checkboxOption">
                                    <input type="checkbox" id="primary-card">
                                    Set as primary card
                                </label>
                            </div>
                        </div>

                        <div class="settingsActionRow">
                            <button type="submit" class="primaryBtn smallBtn">Save Card</button>
                        </div>
                    </form>
                </article>

                <article class="dashboardPanel">
                    <div class="panelHeader">
                        <h2>Cash Balance</h2>
                    </div>

                    <form id="cashForm" class="settingsForm">
                        <div class="inputGroup">
                            <label for="cash-amount">Current Cash Amount</label>
                            <input type="number" id="cash-amount" placeholder="Enter amount">
                            <small class="errorMsg" id="cashError"></small>
                        </div>

                        <div class="settingsActionRow">
                            <button type="submit" class="primaryBtn smallBtn">Save Cash</button>
                        </div>
                    </form>

                    <div class="cashDisplay" id="cashDisplay">No cash amount saved yet.</div>
                </article>
            </section>

            <section class="dashboardPanel">
                <div class="panelHeader">
                    <h2>Saved Cards</h2>
                </div>

                <div class="cardsPreview" id="cardsPreview">
                    <div class="emptyState">
                        No cards added yet. Add your first card above.
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="storage.js"></script>
    <script src="cards.js"></script>
</body>
</html>
