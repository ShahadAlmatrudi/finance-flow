<!DOCTYPE html>
<html lang="en">
<head>
    <title>Plan Setup - FinanceFlow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flowPage">

    <main class="flowWrapper">
        <section class="formCard extraLargeCard planCard">
            <div class="stepHeader centerHeader">
                <span class="stepTag">Step 3 of 5</span>
                <h1 class="pageTitle">Build Your Financial Plan</h1>
                <p class="pageSubtitle">
                    Set your first goal, create a saving habit, and define your spending limits.
                </p>
            </div>

            <form id="planForm" class="mainForm">

                <div class="cardSection">
                    <h2 class="subSectionTitle">1. Main Financial Goal</h2>

                    <div class="inputGroup">
                        <label for="goal-type">Goal Type</label>
                        <select id="goal-type" name="goal-type">
                            <option value="">Select goal type</option>
                            <option>Emergency Fund</option>
                            <option>Big Purchase</option>
                            <option>Travel</option>
                            <option>Debt Repayment</option>
                            <option>Investment</option>
                            <option>Other</option>
                        </select>
                        <small class="errorMsg" id="goalTypeError"></small>
                    </div>

                    <div class="inputGroup">
                        <label for="goal-name">Goal Name</label>
                        <input type="text" id="goal-name" name="goal-name" placeholder="e.g. New Laptop or Emergency Fund">
                        <small class="errorMsg" id="goalNameError"></small>
                    </div>

                    <div class="formRow">
                        <div class="inputGroup">
                            <label for="target-amount">Target Amount</label>
                            <input type="number" id="target-amount" name="target-amount" placeholder="Enter amount">
                            <small class="errorMsg" id="targetAmountError"></small>
                        </div>

                        <div class="inputGroup">
                            <label for="target-date">Target Date</label>
                            <input type="date" id="target-date" name="target-date">
                            <small class="errorMsg" id="targetDateError"></small>
                        </div>
                    </div>
                </div>

                <div class="cardSection">
                    <h2 class="subSectionTitle">2. Saving Plan</h2>

                    <div class="formRow">
                        <div class="inputGroup">
                            <label for="monthly-saving">Monthly Saving Amount</label>
                            <input type="number" id="monthly-saving" name="monthly-saving" placeholder="Enter monthly amount">
                            <small class="errorMsg" id="monthlySavingError"></small>
                        </div>

                        <div class="inputGroup">
                            <label for="saving-account">Saving Account</label>
                            <select id="saving-account" name="saving-account">
                                <option value="">Select account</option>
                                <option>Main Account</option>
                                <option>Savings Account</option>
                                <option>Secondary Account</option>
                            </select>
                            <small class="errorMsg" id="savingAccountError"></small>
                        </div>
                    </div>

                    <label class="optionLabel checkboxOption">
                        <input type="checkbox" id="auto-transfer" name="auto-transfer">
                        Enable automatic monthly transfer
                    </label>

                    <label class="optionLabel checkboxOption">
                        <input type="checkbox" id="emergency-fund" name="emergency-fund">
                        Prioritize emergency fund contribution
                    </label>
                </div>

                <div class="cardSection">
                    <h2 class="subSectionTitle">3. Monthly Budget Categories</h2>
                    <p class="sectionHelper">
                        Select the categories you want FinanceFlow to track first, then set a monthly limit for each one.
                    </p>

                    <div class="categoryGrid">
                        <label class="categoryChoice">
                            <input type="checkbox" class="categoryCheck" data-target="foodLimit" data-name="Food & Dining">
                            <span>Food & Dining</span>
                        </label>

                        <label class="categoryChoice">
                            <input type="checkbox" class="categoryCheck" data-target="shoppingLimit" data-name="Shopping">
                            <span>Shopping</span>
                        </label>

                        <label class="categoryChoice">
                            <input type="checkbox" class="categoryCheck" data-target="transportLimit" data-name="Transportation">
                            <span>Transportation</span>
                        </label>

                        <label class="categoryChoice">
                            <input type="checkbox" class="categoryCheck" data-target="entertainmentLimit" data-name="Entertainment">
                            <span>Entertainment</span>
                        </label>

                        <label class="categoryChoice">
                            <input type="checkbox" class="categoryCheck" data-target="billsLimit" data-name="Bills & Utilities">
                            <span>Bills & Utilities</span>
                        </label>

                        <label class="categoryChoice">
                            <input type="checkbox" class="categoryCheck" data-target="subscriptionsLimit" data-name="Subscriptions">
                            <span>Subscriptions</span>
                        </label>
                    </div>

                    <small class="errorMsg" id="categoriesError"></small>

                    <div class="budgetInputs">
                        <div class="inputGroup budgetInput">
                            <label for="foodLimit">Food & Dining Limit</label>
                            <input type="number" id="foodLimit" placeholder="Enter limit" disabled>
                            <small class="errorMsg"></small>
                        </div>

                        <div class="inputGroup budgetInput">
                            <label for="shoppingLimit">Shopping Limit</label>
                            <input type="number" id="shoppingLimit" placeholder="Enter limit" disabled>
                            <small class="errorMsg"></small>
                        </div>

                        <div class="inputGroup budgetInput">
                            <label for="transportLimit">Transportation Limit</label>
                            <input type="number" id="transportLimit" placeholder="Enter limit" disabled>
                            <small class="errorMsg"></small>
                        </div>

                        <div class="inputGroup budgetInput">
                            <label for="entertainmentLimit">Entertainment Limit</label>
                            <input type="number" id="entertainmentLimit" placeholder="Enter limit" disabled>
                            <small class="errorMsg"></small>
                        </div>

                        <div class="inputGroup budgetInput">
                            <label for="billsLimit">Bills & Utilities Limit</label>
                            <input type="number" id="billsLimit" placeholder="Enter limit" disabled>
                            <small class="errorMsg"></small>
                        </div>

                        <div class="inputGroup budgetInput">
                            <label for="subscriptionsLimit">Subscriptions Limit</label>
                            <input type="number" id="subscriptionsLimit" placeholder="Enter limit" disabled>
                            <small class="errorMsg"></small>
                        </div>
                    </div>
                </div>

                <div class="actionRow">
                    <button type="submit" class="primaryBtn">Next</button>
                </div>
            </form>
        </section>
    </main>

    <script src="storage.js"></script>
    <script src="plan-setup.js"></script>
</body>
</html>
