<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinanceFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="loginPage">

    <header class="topbar">
        <p class="logo">💸 FinanceFlow</p>
    </header>

    <main class="loginContainer">
        <section class="loginCard">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to continue managing your finances with confidence.</p>

            <form class="loginForm" id="loginForm">
                <div class="inputGroup">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="inputGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="formOptions">
                    <label class="rememberMe">
                        <input type="checkbox" id="rememberMe">
                        Remember me
                    </label>
                    <a href="#" class="forgotPassword">Forgot password?</a>
                </div>

                <p id="loginError" class="errorMsg"></p>

                <button type="submit" class="loginMainBtn">Login</button>
            </form>

            <p class="signupText">
                Don’t have an account?
                <a href="signup.html">Sign Up</a>
            </p>
        </section>
    </main>

    <script src="storage.js"></script>
    <script src="login.js"></script>
</body>
</html>
