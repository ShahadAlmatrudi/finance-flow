<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile Setup - FinanceFlow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flowPage">

    <main class="flowWrapper">
        <section class="formCard largeCard profileCard">
            <div class="stepHeader centerHeader">
                <span class="stepTag">Step 2 of 5</span>
                <h1 class="pageTitle">Your Financial Profile</h1>
                <p class="pageSubtitle">
                    Tell us a little about your background so FinanceFlow can build a more personalized setup.
                </p>
            </div>

            <form class="mainForm profileForm" id="profileForm">
                <div class="inputGroup">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="Enter your age">
                    <small class="errorMsg" id="ageError"></small>
                </div>

                <div class="inputGroup">
                    <label for="country">Country</label>
                    <select id="country" name="country">
                        <option value="">Select your country</option>
                        <option>Saudi Arabia</option>
                        <option>UAE</option>
                        <option>Kuwait</option>
                        <option>Qatar</option>
                        <option>Bahrain</option>
                        <option>Other</option>
                    </select>
                    <small class="errorMsg" id="countryError"></small>
                </div>

                <div class="inputGroup">
                    <label for="occupation">Occupation</label>
                    <select id="occupation" name="occupation">
                        <option value="">Select your occupation</option>
                        <option>Student</option>
                        <option>Employed</option>
                        <option>Self-employed</option>
                        <option>Business Owner</option>
                        <option>Freelancer</option>
                        <option>Unemployed</option>
                        <option>Retired</option>
                    </select>
                    <small class="errorMsg" id="occupationError"></small>
                </div>

                <div class="inputGroup">
                    <label for="salary-range">Monthly Income Range</label>
                    <select id="salary-range" name="salary-range">
                        <option value="">Select your income range</option>
                        <option>Less than $1,000</option>
                        <option>$1,000 - $3,000</option>
                        <option>$3,001 - $5,000</option>
                        <option>$5,001 - $10,000</option>
                        <option>$10,000+</option>
                    </select>
                    <small class="errorMsg" id="salaryError"></small>
                </div>

                <div class="inputGroup">
                    <label for="income-frequency">Income Frequency</label>
                    <select id="income-frequency" name="income-frequency">
                        <option value="">Select income frequency</option>
                        <option>Monthly</option>
                        <option>Weekly</option>
                        <option>Irregular</option>
                    </select>
                    <small class="errorMsg" id="frequencyError"></small>
                </div>

                <div class="inputGroup">
                    <label for="income-source">Primary Income Source</label>
                    <select id="income-source" name="income-source">
                        <option value="">Select primary income source</option>
                        <option>Salary</option>
                        <option>Business</option>
                        <option>Freelance</option>
                        <option>Allowance / Family Support</option>
                        <option>Investments</option>
                        <option>Other</option>
                    </select>
                    <small class="errorMsg" id="sourceError"></small>
                </div>

                <div class="inputGroup">
                    <label for="obligation-type">Main Financial Obligation</label>
                    <select id="obligation-type" name="obligation-type">
                        <option value="">Select obligation type</option>
                        <option>Rent</option>
                        <option>Loan Payment</option>
                        <option>Credit Card Debt</option>
                        <option>Family Support</option>
                        <option>Utilities</option>
                        <option>Other</option>
                    </select>
                    <small class="errorMsg" id="obligationTypeError"></small>
                </div>

                <div class="inputGroup">
                    <label for="obligation-amount">Obligation Amount</label>
                    <input type="number" id="obligation-amount" name="obligation-amount" placeholder="Enter amount">
                    <small class="errorMsg" id="obligationAmountError"></small>
                </div>

                <div class="actionRow">
                    <button type="submit" class="primaryBtn">Next</button>
                </div>
            </form>
        </section>
    </main>

    <script src="storage.js"></script>
    <script src="profile.js"></script>
</body>
</html>
