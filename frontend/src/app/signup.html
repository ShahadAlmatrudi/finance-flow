<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up - FinanceFlow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="authPage">

    <header class="simpleTopbar">
        <a href="index.html" class="logo">💸 FinanceFlow</a>
    </header>

    <main class="centerPage">
        <section class="formCard">
            <h1 class="pageTitle">Create Your Account</h1>
            <p class="pageSubtitle">
                Start your journey toward better financial planning.
            </p>

            <form class="mainForm" id="signupForm">
                <div class="inputGroup">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
                    <small class="errorMsg" id="fullnameError"></small>
                </div>

                <div class="inputGroup">
                    <label for="signup-email">Email</label>
                    <input type="text" id="signup-email" name="email" placeholder="Enter your email">
                    <small class="errorMsg" id="emailError"></small>
                </div>

                <div class="inputGroup">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Enter your password">
                    <small class="errorMsg" id="passwordError"></small>
                </div>

                <div class="inputGroup">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password">
                    <small class="errorMsg" id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="primaryBtn fullBtn">Sign Up</button>
            </form>

            <p class="bottomText">
                Already have an account?
                <a href="login.html" class="textLink">Log In</a>
            </p>
        </section>
    </main>

    <script src="storage.js"></script>
    <script src="signup.js"></script>
</body>
</html>
