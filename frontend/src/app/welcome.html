<!DOCTYPE html>
<html lang="en">
<head>
    <title>Welcome - FinanceFlow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="welcomePageBody">

    <main class="welcomePage">
        <section class="welcomeCard">
            <div class="welcomeIconWrap">
                <span class="welcomeEmoji">👋</span>
            </div>

            <h1 class="welcomeTitle">
                Welcome, <span id="welcomeUserName">User</span>
            </h1>

            <p class="welcomeSubtitle">
                Your account is ready and your financial setup has been saved successfully.
            </p>

            <div class="welcomeSummary" id="welcomeSummary">
                <div class="welcomeSummaryItem">
                    <span class="summaryLabel">Goal</span>
                    <span class="summaryValue" id="summaryGoal">Not set</span>
                </div>

                <div class="welcomeSummaryItem">
                    <span class="summaryLabel">Monthly Saving</span>
                    <span class="summaryValue" id="summarySaving">$0</span>
                </div>

                <div class="welcomeSummaryItem">
                    <span class="summaryLabel">Saved Cards</span>
                    <span class="summaryValue" id="summaryCards">0</span>
                </div>

                <div class="welcomeSummaryItem">
                    <span class="summaryLabel">Cash</span>
                    <span class="summaryValue" id="summaryCash">$0</span>
                </div>
            </div>

            <div class="welcomeActions">
                <a href="dashboard.html" class="primaryBtn fullBtn welcomeMainBtn">
                    Go to Dashboard →
                </a>

                <button type="button" class="secondaryBtn fullBtn welcomeSecondaryBtn" id="signOutBtn">
                    Sign Out
                </button>
            </div>

            <p class="welcomeHelpText">
                Need help?
                <a href="#" class="textLink">Contact Support</a>
            </p>
        </section>
    </main>

    <script src="storage.js"></script>
    <script src="welcome.js"></script>
</body>
</html>
